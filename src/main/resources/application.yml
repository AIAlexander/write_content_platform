spring:
  application:
    name: write-content-platform
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/write_content_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600
  session:
    store-type: redis
    timeout: 2592000
  profiles:
    active: local
server:
  port: 8067
  servlet:
    context-path: /api
    # cookie 过期 30 天
    session:
      cookie:
        max-age: 2592000


springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: cloud.alex.writecontentplatform.controller
# knife4j???????????????
knife4j:
  enable: true
  setting:
    language: zh_cn